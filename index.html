<!DOCTYPE html>
<html>
<head>

<title>Customer Care AI Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Customer Care AI Dashboard</h1>

</header>


<section class="dashboard">

<div class="card">
<h3>Total Tickets</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>High Priority</h3>
<p id="high">0</p>
</div>

<div class="card">
<h3>Resolved</h3>
<p id="resolved">0</p>
</div>

</section>


<section class="formSection">

<h2>Create Support Ticket</h2>

<form id="ticketForm">

<input type="text" id="name" placeholder="Customer Name" required>

<input type="text" id="issue" placeholder="Issue description" required>

<select id="priority">

<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>

</select>

<button type="submit">Create Ticket</button>

</form>

</section>


<section class="controls">

<input type="text" id="searchBox" placeholder="Search Customer">

<button id="searchBtn">Search</button>

<button id="sortBtn">Sort Priority</button>

<button id="resolveBtn">Resolve Top Ticket</button>

</section>


<section>

<h2>Ticket Queue</h2>

<ul id="ticketList"></ul>

</section>


<script src="dsa.js"></script>
<script src="app.js"></script>

</body>
</html>
