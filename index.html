<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Care Service System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Customer Care Service System</h1>

<nav>
<ul>
<li><a href="#submit">Submit Ticket</a></li>
<li><a href="#tickets">Tickets</a></li>
<li><a href="#tips">Support Tips</a></li>
</ul>
</nav>

</header>

<main>

<section id="submit">

<h2>Submit Support Ticket</h2>

<form id="ticketForm">

<input type="text" id="name" placeholder="Customer Name" required>

<input type="email" id="email" placeholder="Email" required>

<textarea id="issue" placeholder="Describe the issue..." required></textarea>

<select id="priority">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<button type="submit">Create Ticket</button>

</form>

</section>


<section id="tickets">

<h2>Support Tickets</h2>

<input type="text" id="search" placeholder="Search tickets...">

<ul id="ticketList"></ul>

</section>


<section id="tips">

<h2>Support Tips</h2>

<button id="loadTips">Load Tips</button>

<ul id="tipsList"></ul>

</section>

</main>


<footer>

<p>© 2026 Customer Care Service System</p>

</footer>

<script src="script.js"></script>

</body>

</html>
