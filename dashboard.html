<!DOCTYPE html>
<html>
<head>

<title>Customer Care Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Customer Care Dashboard</h1>

<button onclick="logout()">Logout</button>

<button onclick="toggleTheme()">Dark/Light</button>

</header>


<section class="stats">

<div class="statCard">

<h3>Total Tickets</h3>
<p id="totalTickets">0</p>

</div>

<div class="statCard">

<h3>High Priority</h3>
<p id="highTickets">0</p>

</div>

<div class="statCard">

<h3>Resolved</h3>
<p id="resolvedTickets">0</p>

</div>

</section>


<section class="ticketForm">

<h2>Create Ticket</h2>

<input id="name" placeholder="Customer Name">

<input id="issue" placeholder="Issue">

<select id="priority">

<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>

</select>

<select id="category">

<option>Billing</option>
<option>Technical</option>
<option>Account</option>

</select>

<button onclick="createTicket()">Create Ticket</button>

</section>


<section class="controls">

<input id="searchBox" placeholder="Search customer">

<button onclick="searchTicket()">Search</button>

<button onclick="sortPriority()">Sort Priority</button>

<button onclick="resolveTicket()">Resolve Top</button>

</section>


<section>

<h2>Tickets</h2>

<ul id="ticketList"></ul>

</section>


<section class="charts">

<canvas id="ticketChart"></canvas>

</section>

<script src="dsa.js"></script>
<script src="app.js"></script>

</body>
</html>
