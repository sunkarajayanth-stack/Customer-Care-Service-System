<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>DSA Visualization</title><link rel='stylesheet' href='css/style.css'><link rel='stylesheet' href='css/dashboard.css'></head><body><div class='page-wrap'>
<nav class='navbar glass'><strong>DSA Visualizer</strong><div class='link-list'><a href='dashboard.html'>Dashboard</a></div></nav>
<section class='glass' style='padding:16px'>
<div class='tabs'><button class='tab-btn' data-tab='stack'>Stack</button><button class='tab-btn' data-tab='queue'>Queue</button><button class='tab-btn' data-tab='linked'>Linked List</button><button class='tab-btn' data-tab='sort'>Sorting</button><button class='tab-btn' data-tab='search'>Searching</button><button class='tab-btn' data-tab='graph'>Graph</button><button class='tab-btn' data-tab='tree'>Tree</button></div>
<div id='stack' class='tab-pane'><div class='row'><input id='stackValue' placeholder='Value'><button id='stackPushBtn'>Push</button><button id='stackPopBtn'>Pop</button></div><div id='stackViz' class='widget-board'></div></div>
<div id='queue' class='tab-pane hidden'><div class='row'><input id='queueValue' placeholder='Value'><button id='queueEnqueueBtn'>Enqueue</button><button id='queueDequeueBtn'>Dequeue</button></div><div id='queueViz' class='widget-board'></div></div>
<div id='linked' class='tab-pane hidden'><div class='row'><input id='linkedValue' placeholder='Value'><button id='linkedInsertBtn'>Insert End</button><button id='linkedRemoveBtn'>Remove Head</button></div><div id='linkedViz' class='widget-board'></div></div>
<div id='sort' class='tab-pane hidden'><div class='row'><input id='sortInput' placeholder='e.g. 5,1,4,2'><button id='bubbleSortBtn'>Bubble Sort</button><button id='quickSortBtn'>Quick Sort</button></div><div id='sortViz'></div></div>
<div id='search' class='tab-pane hidden'><div class='row'><input id='searchArrayInput' placeholder='Sorted array'><input id='searchTarget' placeholder='Target'><button id='linearSearchBtn'>Linear Search</button><button id='binarySearchBtn'>Binary Search</button></div><div id='searchViz'></div></div>
<div id='graph' class='tab-pane hidden'><button id='runBfsBtn'>Run BFS Traversal</button><button id='runDfsBtn'>Run DFS Traversal</button><pre id='graphViz'></pre></div>
<div id='tree' class='tab-pane hidden'><button id='runInOrderBtn'>In-Order</button><button id='runPreOrderBtn'>Pre-Order</button><button id='runPostOrderBtn'>Post-Order</button><pre id='treeViz'></pre></div>
</section></div><script src='js/dsa_visualizer.js'></script></body></html>
