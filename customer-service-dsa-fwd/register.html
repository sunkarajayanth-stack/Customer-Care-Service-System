<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register</title><link rel="stylesheet" href="css/style.css"></head><body>
<div class="orb one"></div><div class="orb three"></div><div class="page-wrap"><div class="auth-layout"><section class="brand-panel glass"><h1>Create Account</h1><p>Register customer or support agent profile.</p></section><section class="auth-card glass"><h2>Register</h2><label>Name<input id="regName" placeholder="Full name"></label><label>Email<input id="regEmail" type="email" placeholder="mail@example.com"></label><label>Role<select id="regRole"><option>Customer</option><option>Agent</option><option>Admin</option></select></label><label>Password<input id="regPassword" type="password"></label><button id="registerBtn">Create Account</button><p id="regMsg"></p><p>Already registered? <a href="login.html">Login</a></p></section></div></div>
<script src="js/auth.js"></script></body></html>
